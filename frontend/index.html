<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QY Quant - 量化交易平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="/src/logo.png" />
  </head>
  <body style="background:#0B0E14">
    <script>
      // Apply theme before paint to prevent flash
      (function(){var t=localStorage.getItem('qyquant_theme');if(t==='light'){document.documentElement.dataset.theme='light';document.body.style.background='#F0F2F5'}else{document.documentElement.dataset.theme='dark'}})();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
