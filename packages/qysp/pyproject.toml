[project]
name = "qysp"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "click>=8.3.1",
]

[project.scripts]
qys = "qysp.cli.main:cli"

[project.optional-dependencies]
indicators = ["pandas>=2.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/qysp"]
