services:
  postgres:
    image: postgres:15-alpine
    container_name: qyquant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qyquant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qyquant_password}
      POSTGRES_DB: ${POSTGRES_DB:-qyquant}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qyquant} -d ${POSTGRES_DB:-qyquant}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qyquant-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redis_password} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: qyquant-backend
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-qyquant}:${POSTGRES_PASSWORD:-qyquant_password}@postgres:5432/${POSTGRES_DB:-qyquant}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
      CELERYD_CONCURRENCY: ${CELERYD_CONCURRENCY:-10}
      CELERY_TASK_SOFT_TIME_LIMIT: ${CELERY_TASK_SOFT_TIME_LIMIT:-300}
      CELERY_TASK_TIME_LIMIT: ${CELERY_TASK_TIME_LIMIT:-330}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-in-production}
      FERNET_KEY: ${FERNET_KEY:-change-this-fernet-key-in-production}
      STRATEGY_ENCRYPT_KEY: ${STRATEGY_ENCRYPT_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      BACKTEST_SANDBOX_MODE: ${BACKTEST_SANDBOX_MODE:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:58888}
      BACKTEST_DATA_PROVIDER: ${BACKTEST_DATA_PROVIDER:-auto}
      BACKTEST_INTERVAL: ${BACKTEST_INTERVAL:-1m}
      JOINQUANT_INTERVAL: ${JOINQUANT_INTERVAL:-1d}
      BINANCE_BASE_URL: ${BINANCE_BASE_URL:-https://api.binance.com}
      BINANCE_API_TIMEOUT: ${BINANCE_API_TIMEOUT:-10}
      BINANCE_KLINE_CACHE_TTL: ${BINANCE_KLINE_CACHE_TTL:-300}
      BINANCE_PRICE_CACHE_TTL: ${BINANCE_PRICE_CACHE_TTL:-2}
      FREEGOLD_BASE_URL: ${FREEGOLD_BASE_URL:-https://freegoldapi.com}
      FREEGOLD_API_TIMEOUT: ${FREEGOLD_API_TIMEOUT:-10}
      FREEGOLD_DATA_CACHE_TTL: ${FREEGOLD_DATA_CACHE_TTL:-21600}
      FREEGOLD_INTERVAL: ${FREEGOLD_INTERVAL:-1d}
      JQDATA_USERNAME: ${JQDATA_USERNAME:-}
      JQDATA_PASSWORD: ${JQDATA_PASSWORD:-}
      JQDATA_REQUEST_TIMEOUT_SECONDS: ${JQDATA_REQUEST_TIMEOUT_SECONDS:-3}
      JQDATA_MAX_RETRIES: ${JQDATA_MAX_RETRIES:-2}
      AUTH_FIXED_SMS_CODE: ${AUTH_FIXED_SMS_CODE:-123456}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    volumes:
      - backend_storage:/app/backend/storage
    ports:
      - "${BACKEND_PORT:-59999}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.celery
    container_name: qyquant-celery-worker
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-qyquant}:${POSTGRES_PASSWORD:-qyquant_password}@postgres:5432/${POSTGRES_DB:-qyquant}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
      CELERYD_CONCURRENCY: ${CELERYD_CONCURRENCY:-10}
      CELERY_TASK_SOFT_TIME_LIMIT: ${CELERY_TASK_SOFT_TIME_LIMIT:-300}
      CELERY_TASK_TIME_LIMIT: ${CELERY_TASK_TIME_LIMIT:-330}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-in-production}
      FERNET_KEY: ${FERNET_KEY:-change-this-fernet-key-in-production}
      STRATEGY_ENCRYPT_KEY: ${STRATEGY_ENCRYPT_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      BACKTEST_SANDBOX_MODE: ${BACKTEST_SANDBOX_MODE:-}
      BACKTEST_DATA_PROVIDER: ${BACKTEST_DATA_PROVIDER:-auto}
      BACKTEST_INTERVAL: ${BACKTEST_INTERVAL:-1m}
      JOINQUANT_INTERVAL: ${JOINQUANT_INTERVAL:-1d}
      BINANCE_BASE_URL: ${BINANCE_BASE_URL:-https://api.binance.com}
      BINANCE_API_TIMEOUT: ${BINANCE_API_TIMEOUT:-10}
      BINANCE_KLINE_CACHE_TTL: ${BINANCE_KLINE_CACHE_TTL:-300}
      BINANCE_PRICE_CACHE_TTL: ${BINANCE_PRICE_CACHE_TTL:-2}
      FREEGOLD_BASE_URL: ${FREEGOLD_BASE_URL:-https://freegoldapi.com}
      FREEGOLD_API_TIMEOUT: ${FREEGOLD_API_TIMEOUT:-10}
      FREEGOLD_DATA_CACHE_TTL: ${FREEGOLD_DATA_CACHE_TTL:-21600}
      FREEGOLD_INTERVAL: ${FREEGOLD_INTERVAL:-1d}
      JQDATA_USERNAME: ${JQDATA_USERNAME:-}
      JQDATA_PASSWORD: ${JQDATA_PASSWORD:-}
      JQDATA_REQUEST_TIMEOUT_SECONDS: ${JQDATA_REQUEST_TIMEOUT_SECONDS:-3}
      JQDATA_MAX_RETRIES: ${JQDATA_MAX_RETRIES:-2}
    volumes:
      - backend_storage:/app/backend/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile.celery
    container_name: qyquant-celery-beat
    restart: unless-stopped
    command: ["sh", "-lc", "celery -A app.celery_app beat --loglevel=info"]
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-qyquant}:${POSTGRES_PASSWORD:-qyquant_password}@postgres:5432/${POSTGRES_DB:-qyquant}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-in-production}
      FERNET_KEY: ${FERNET_KEY:-change-this-fernet-key-in-production}
      STRATEGY_ENCRYPT_KEY: ${STRATEGY_ENCRYPT_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
    volumes:
      - backend_storage:/app/backend/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qyquant-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-58888}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  backend_storage:
